<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}} — WAIaaS</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:url" content="{{CANONICAL_URL}}">
  <meta property="og:site_name" content="WAIaaS">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/article.css">
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #111111;
      --border: #2a2a2a;
      --text: #b0b0b0;
      --text-bright: #d4d4d4;
      --text-dim: #666666;
      --green: #00ff41;
      --green-dim: #00cc33;
      --cyan: #00d4ff;
      --yellow: #ffcc00;
      --magenta: #ff44cc;
      --red: #ff4444;
      --amber: #ff9500;
      --blue: #4488ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      font-size: 15px;
    }

    a { color: var(--cyan); text-decoration: none; }
    a:hover { color: var(--green); text-decoration: underline; }

    .container { max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.05em;
    }
    .logo::before { content: "> "; color: var(--text-dim); }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a {
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: 0.02em;
    }
    .nav-links a:hover { color: var(--green); text-decoration: none; }
    .nav-links a::before { content: "["; color: var(--text-dim); }
    .nav-links a::after { content: "]"; color: var(--text-dim); }
    .nav-links a.active { color: var(--green); }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    footer p::before { content: "// "; color: #444444; }

    /* Scanline effect */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      z-index: 9999;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-links { gap: 12px; }
      .nav-links a { font-size: 0.75rem; }
    }

    /* highlight.js monokai-sublime theme (inlined for zero client JS) */
    .hljs{display:block;overflow-x:auto;padding:0.5em;background:var(--surface);}
    .hljs,.hljs-tag,.hljs-subst{color:#f8f8f2;}
    .hljs-strong,.hljs-emphasis{color:#a8a8a2;}
    .hljs-bullet,.hljs-quote,.hljs-number,.hljs-regexp,.hljs-literal,.hljs-link{color:#ae81ff;}
    .hljs-code,.hljs-title,.hljs-section,.hljs-selector-class{color:#a6e22e;}
    .hljs-strong{font-weight:bold;}
    .hljs-emphasis{font-style:italic;}
    .hljs-keyword,.hljs-selector-tag,.hljs-name{color:#f92672;}
    .hljs-attr,.hljs-symbol,.hljs-variable,.hljs-template-variable{color:#66d9ef;}
    .hljs-string,.hljs-selector-id,.hljs-selector-attr,.hljs-selector-pseudo,.hljs-addition{color:#e6db74;}
    .hljs-comment,.hljs-deletion,.hljs-meta{color:#75715e;}
    .hljs-built_in,.hljs-type,.hljs-params{color:#66d9ef;font-style:italic;}
  </style>
  {{JSON_LD}}
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="logo" style="text-decoration:none">WAIaaS</a>
      <div class="nav-links">
        <a href="https://github.com/minhoyoo-iotrust/WAIaaS">GitHub</a>
        <a href="https://www.npmjs.com/package/@waiaas/cli">npm</a>
        <a href="https://hub.docker.com/u/waiaas">Docker</a>
        <a href="/download/" class="{{ACTIVE_DOWNLOAD}}">Download</a>
        <a href="/blog/" class="{{ACTIVE_BLOG}}">Blog</a>
        <a href="/docs/" class="{{ACTIVE_DOCS}}">Docs</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <article class="article">
      <h1>{{TITLE}}</h1>
      <div class="article-meta">{{DATE}}</div>
      {{CONTENT}}
    </article>
  </main>

  <footer>
    <div class="container">
      <p>WAIaaS is open source software. Built for AI agents that need secure wallet access.</p>
    </div>
  </footer>

</body>
</html>
