<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAIaaS WalletConnect Spike</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #app {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }
      h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
      .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.9rem; }
      .connect-section { margin: 2rem 0; }
      .sign-section {
        margin: 2rem 0;
        display: none;
      }
      .sign-section.visible { display: block; }
      button.sign-btn {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        cursor: pointer;
        font-size: 1rem;
        margin: 0.5rem;
      }
      button.sign-btn:hover { background: #2563eb; }
      button.sign-btn:disabled { background: #555; cursor: not-allowed; }
      #log {
        margin-top: 2rem;
        text-align: left;
        background: #111;
        border: 1px solid #333;
        border-radius: 0.5rem;
        padding: 1rem;
        font-family: monospace;
        font-size: 0.8rem;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .log-entry { margin-bottom: 0.25rem; }
      .log-entry.success { color: #4ade80; }
      .log-entry.error { color: #f87171; }
      .log-entry.info { color: #60a5fa; }
      .env-warning {
        background: #422006;
        border: 1px solid #854d0e;
        color: #fbbf24;
        padding: 1rem;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>WAIaaS WalletConnect Spike</h1>
      <p class="subtitle">Tauri WebView + @reown/appkit compatibility test</p>

      <div id="env-warning" class="env-warning" style="display:none"></div>

      <div class="connect-section">
        <w3m-button></w3m-button>
      </div>

      <div id="sign-section" class="sign-section">
        <p>Connected! Test signing:</p>
        <button class="sign-btn" id="btn-sign-message">Sign Message</button>
      </div>

      <div id="log"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
