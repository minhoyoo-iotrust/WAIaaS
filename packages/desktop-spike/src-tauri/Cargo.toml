[package]
name = "waiaas-desktop-spike"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
name = "waiaas_desktop_spike_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
