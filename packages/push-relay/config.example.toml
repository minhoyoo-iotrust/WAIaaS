[relay]
ntfy_server = "https://ntfy.sh"
sign_topic_prefix = "waiaas-sign"
notify_topic_prefix = "waiaas-notify"
wallet_names = ["dcent", "trading-bot"]

[relay.push]
provider = "pushwoosh"

[relay.push.pushwoosh]
api_token = "XXXXXX-XXXXXX"
application_code = "ABCDE-12345"
# api_url = "https://api.pushwoosh.com/json/1.3/createMessage"  # default; override for Private Cloud

# Extra fields injected into the Pushwoosh notification object
# [relay.push.pushwoosh.extra_fields]
# link = "/waiaas"
# campaign = "onboarding"

# Or use FCM:
# [relay.push.fcm]
# project_id = "my-wallet-app"
# service_account_key_path = "/etc/push-relay/service-account.json"

# Optional: customize push notification payload per category
# Static fields are added to every push notification
# [relay.push.payload.static_fields]
# app_id = "com.example.wallet"
# env = "production"
#
# Category-specific fields (merged on top of static_fields)
# [relay.push.payload.category_map.sign_request]
# sound = "alert.caf"
# badge = "1"
#
# [relay.push.payload.category_map.notification]
# sound = "default"
# channel = "info"

[relay.server]
port = 3200
host = "0.0.0.0"
api_key = "your-secret-api-key"
