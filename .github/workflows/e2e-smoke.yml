name: E2E Smoke Tests

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to test (e.g. 3.0.0-rc.1). Leave empty to auto-detect latest release.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run after successful Release workflow (skip failures/cancellations)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Read version from package.json (matches the npm-published version from this commit)
            VERSION=$(node -p "require('./package.json').version")
            if [ -z "$VERSION" ]; then
              echo "::error::Could not determine release version from package.json"
              exit 1
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Testing version: $VERSION"

          # Wait for npm registry propagation (max 5 minutes)
          MAX_WAIT=300; ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if npm view "@waiaas/cli@$VERSION" version >/dev/null 2>&1; then
              echo "Version $VERSION available on npm"
              break
            fi
            echo "Waiting for npm propagation... (${ELAPSED}s/${MAX_WAIT}s)"
            sleep 30; ELAPSED=$((ELAPSED + 30))
          done

      - name: Build e2e-tests package
        run: pnpm turbo run build --filter=@waiaas/e2e-tests --filter=@waiaas/push-relay --filter=@waiaas/mcp

      - name: Install daemon globally
        id: install
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Add npm global bin to PATH (pnpm setup only adds PNPM_HOME)
          NPM_GLOBAL_BIN="$(npm prefix -g)/bin"
          echo "$NPM_GLOBAL_BIN" >> "$GITHUB_PATH"
          export PATH="$NPM_GLOBAL_BIN:$PATH"

          # Retry with backoff — npm registry propagation may take a few minutes
          MAX_ATTEMPTS=5
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: npm install -g @waiaas/cli@$VERSION"
            if npm install -g "@waiaas/cli@$VERSION" 2>&1; then
              echo "Successfully installed @waiaas/cli@$VERSION"
              # Capture actual CLI path for explicit passing (avoids PATH propagation issues in pnpm/vitest)
              CLI_PATH="$NPM_GLOBAL_BIN/waiaas"
              echo "cli_path=$CLI_PATH" >> "$GITHUB_OUTPUT"
              echo "CLI path: $CLI_PATH"
              exit 0
            fi
            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              WAIT=$((ATTEMPT * 30))
              echo "Install failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
            ATTEMPT=$((ATTEMPT + 1))
          done
          echo "::error::Failed to install @waiaas/cli@$VERSION after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Run offchain E2E tests
        run: pnpm --filter @waiaas/e2e-tests test:offchain
        env:
          E2E_DAEMON_INSTALL_MODE: global
          WAIAAS_CLI_PATH: ${{ steps.install.outputs.cli_path }}
          CI: 'true'

      - name: Generate summary
        if: always()
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "## E2E Smoke Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f packages/e2e-tests/e2e-report.md ]; then
            cat packages/e2e-tests/e2e-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report file generated. Check test output above." >> "$GITHUB_STEP_SUMMARY"
          fi

