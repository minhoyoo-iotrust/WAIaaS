name: Auto Merge

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    # Only auto-merge release-please PRs
    if: github.actor == 'release-please[bot]' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        run: |
          # Always use RELEASE_PAT so that merge commits trigger downstream
          # workflows (e.g., release-please). GITHUB_TOKEN-authored events
          # do not trigger other workflows due to GitHub's recursion guard.
          GH_TOKEN="${RELEASE_PAT}" gh pr merge "$PR_URL" --auto --merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
