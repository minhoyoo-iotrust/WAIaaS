name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # Stage 1: push + PR common - affected packages only
  stage1:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Configure swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Fetch base branch
        shell: bash
        run: |
          BASE_REF="${{ github.base_ref || github.ref_name }}"
          git fetch origin "$BASE_REF"

      - name: Determine affected base
        id: affected-base
        shell: bash
        run: |
          BASE_REF="${{ github.base_ref || github.ref_name }}"
          if [ "${{ github.event_name }}" = "push" ]; then
            # Push: compare with previous commit so --affected detects changes
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          else
            echo "base=origin/$BASE_REF" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint (affected)
        run: pnpm turbo run lint --affected
        env:
          TURBO_SCM_BASE: ${{ steps.affected-base.outputs.base }}

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --affected
        env:
          TURBO_SCM_BASE: ${{ steps.affected-base.outputs.base }}

      - name: Unit Tests (affected)
        run: pnpm turbo run test:unit --affected --concurrency 1 -- --coverage
        env:
          TURBO_SCM_BASE: ${{ steps.affected-base.outputs.base }}

      - name: E2E Coverage Check
        run: pnpm verify:e2e-coverage

      - name: Agent UAT Coverage Check
        run: pnpm verify:agent-uat

  # Stage 2: PR only - full suite + coverage gate + coverage reports
  # Skip for main-target PRs (already verified on dev; release.yml runs full suite)
  stage2:
    if: github.event_name != 'push' && github.base_ref != 'main'
    needs: stage1
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=8192'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Configure swap
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build
        run: pnpm turbo run build

      - name: Unit Tests - Full
        run: pnpm turbo run test:unit -- --coverage

      - name: Network Setting Keys Completeness (#282)
        run: pnpm --filter @waiaas/daemon test:unit -- --run src/__tests__/network-setting-keys-completeness.test.ts

      - name: Integration Tests
        run: pnpm turbo run test:integration

      - name: Security Tests
        run: pnpm turbo run test:security

      - name: E2E Offchain Tests
        run: pnpm --filter @waiaas/e2e-tests test:offchain

      - name: Verify Enum SSoT
        run: pnpm run verify:enums

      - name: Verify Migration Safety
        run: pnpm run verify:migrations

      - name: Validate OpenAPI Spec
        run: pnpm run validate:openapi

      - name: Check API Types Freshness
        run: pnpm run check:api-types-freshness

      - name: Check API Contract
        run: pnpm run check:api-contract

      - name: Coverage Gate
        run: bash scripts/coverage-gate.sh
        env:
          COVERAGE_GATE_MODE: soft

      - name: 'Coverage Report - @waiaas/core'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/core'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/core

      - name: 'Coverage Report - @waiaas/daemon'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/daemon'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/daemon

      - name: 'Coverage Report - @waiaas/adapter-solana'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/adapter-solana'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/adapters/solana

      - name: 'Coverage Report - @waiaas/sdk'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/sdk'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/sdk

      - name: 'Coverage Report - @waiaas/cli'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/cli'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/cli

      - name: 'Coverage Report - @waiaas/mcp'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/mcp'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/mcp

      - name: 'Coverage Report - @waiaas/admin'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/admin'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/admin

      - name: 'Coverage Report - @waiaas/adapter-evm'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/adapter-evm'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/adapters/evm

      - name: 'Coverage Report - @waiaas/wallet-sdk'
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          name: '@waiaas/wallet-sdk'
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          working-directory: packages/wallet-sdk
