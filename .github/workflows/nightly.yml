name: Nightly

on:
  schedule:
    - cron: '30 2 * * *'  # UTC 02:30 daily
  workflow_dispatch:       # Manual trigger (also prevents 60-day inactivity disable)

permissions:
  contents: read

jobs:
  # Full test suite: lint + typecheck + unit + integration + security + coverage gate (hard)
  full-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo run build

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Unit Tests
        run: pnpm turbo run test:unit -- --coverage

      - name: Integration Tests
        run: pnpm turbo run test:integration

      - name: Security Tests
        run: pnpm turbo run test:security

      - name: Verify Enum SSoT
        run: pnpm run verify:enums

      - name: Verify Migration Safety
        run: pnpm run verify:migrations

      - name: Coverage Gate
        run: bash scripts/coverage-gate.sh
        env:
          COVERAGE_GATE_MODE: hard

      - name: Collect test counts
        if: success()
        id: test-count
        run: |
          # Extract test count from turbo cached output (already ran in Unit Tests step)
          TOTAL=$(pnpm turbo run test:unit 2>&1 | sed 's/\x1b\[[0-9;]*m//g' | grep -oP 'Tests\s+\K[0-9]+(?=\s+passed)' | awk '{s+=$1} END {print s}')
          if [ -z "$TOTAL" ] || [ "$TOTAL" = "0" ]; then
            echo "Warning: Could not parse test count, using fallback"
            TOTAL="unknown"
          fi
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Test count: $TOTAL"

      - name: Update test badge
        if: success() && steps.test-count.outputs.total != 'unknown'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.TEST_BADGE_GIST_ID }}
          filename: waiaas-test-badge.json
          label: Tests
          message: "${{ steps.test-count.outputs.total }} passing"
          color: brightgreen

  # Local blockchain validator tests: Solana test-validator + Anvil
  local-validator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Solana
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Start solana-test-validator
        run: |
          solana --version
          nohup solana-test-validator --reset --quiet > /dev/null 2>&1 &
          sleep 10
          solana cluster-version

      - name: Setup Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Start Anvil
        run: |
          nohup anvil --silent > /dev/null 2>&1 &
          sleep 3

      - name: Build
        run: pnpm --filter='!@waiaas/admin' -r run build

      - name: Chain Tests
        run: pnpm -r run test:chain --if-present

  # Devnet integration tests (non-blocking)
  devnet:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo run build

      - name: Chain Tests (Devnet)
        run: pnpm turbo run test:chain
        env:
          DEVNET_TEST: 'true'

  # EVM Sepolia testnet integration tests (non-blocking)
  evm-testnet:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build
        run: pnpm turbo run build

      - name: Chain Tests (EVM Testnet)
        run: pnpm turbo run test:chain
        env:
          WAIAAS_TEST_EVM_TESTNET: 'true'
